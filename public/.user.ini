; Hostinger PHP Configuration for Shola Ghar
; Upload to public/ directory on Hostinger

upload_max_filesize = 50M
post_max_size = 55M
max_execution_time = 180
max_input_time = 180
memory_limit = 256M

; Error reporting (turn off in production)
display_errors = Off
log_errors = On
error_log = ../logs/error.log
